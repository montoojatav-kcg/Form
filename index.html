<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment Form</title>
</head>
<body>
        <h1>Hey dear! </h1>
        <h1>fill the form and get some special gift </h1>
<h2>APPOINTMENT FORM</h2>

<form action="https://github.com/montoo-jatav1/Form/blob/main/Thankyou.html" method="POST">

<fieldset>
<legend>NAME</legend>
<input type="text" name="name" required>
</fieldset>

<fieldset>
<legend>SURNAME</legend>
<input type="text" name="surname" required>
</fieldset>



<fieldset>
<legend>Gender</legend>
Male <input type="radio" name="gender" value="Male" required>
Female <input type="radio" name="gender" value="Female">
Transgender <input type="radio" name="gender" value="Transgender">
</fieldset>

<fieldset>
<legend>Address</legend>
<textarea name="address" required></textarea>
</fieldset>

<fieldset>
<legend>Pincode</legend>
<input type="text" name="pincode" required>
</fieldset>

<fieldset>
<legend>EMAIL</legend>
<input type="email" name="email" required>
</fieldset>
<fieldset>
<legend>PASSWORD</legend>
<input type="password" name="password" required>
</fieldset>

<fieldset>
<legend>AREA:</legend>

        <select name="" ID= "--select_area_type--">
        <option value="RURAL">RURAL</option>
        <option value="URBAN">URBAN</option>
        </select>
</fieldset>
<br>
<input type="hidden" name="_next" value="thankyou.html">
        <form action="https://formspree.io/f/xbdawoqp" method="POST">

<input type="hidden" name="_next" value="thankyou.html">


<button type="submit">SUBMIT</button>

</form>
        <hr> 
    
</body>
